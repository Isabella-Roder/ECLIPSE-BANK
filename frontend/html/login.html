<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Eclipse Bank</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <main class="auth-page">
        <section class="auth-card" id="auth-card">
            <div class="brand auth-brand">
                <span class="brand-mark"></span>
                <div>
                    <strong>ECLIPSE</strong>
                    <small>BANK</small>
                </div>
            </div>

            <div class="auth-header">
                <p class="eyebrow">Acesso seguro</p>
                <h1>Entrar na conta</h1>
                <p>Informe seus dados para acessar o Eclipse Bank.</p>
            </div>

            <div class="auth-forms">
            <form id="form-login" class="form-card">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="seuemail@email.com" required>

                <label for="senha">Senha</label>
                <input type="password" id="senha" placeholder="Digite sua senha" required>

                <select id="tipoLogin">
                    <option value="usuario">Pessoa física</option>
                    <option value="empresa">Empresa</option>
                </select>

                <button type="submit">Entrar</button>
            </form>

            <form id="form-abertura-conta" class="form-card form-cadastro-conta">
                <label for="cadastroNome">Nome</label>
                <input type="text" id="cadastroNome" required>

                <label for="cadastroNomeSocial">Nome social</label>
                <input type="text" id="cadastroNomeSocial">

                <label for="cadastroCpf">CPF</label>
                <input type="text" id="cadastroCpf" required>

                <label for="cadastroTelefone">Telefone</label>
                <input type="text" id="cadastroTelefone" required>

                <label for="cadastroEmail">Email</label>
                <input type="email" id="cadastroEmail" required>

                <label for="cadastroSenha">Senha</label>
                <input type="password" id="cadastroSenha" required>

                <label for="cadastroConfirmarSenha">Confirma senha</label>
                <input type="password" id="cadastroConfirmarSenha" required>

                <button type="button" id="mostrar-senhas">Mostrar senhas</button>

                <label for="cadastroDataNascimento">Data de nascimento</label>
                <input type="date" id="cadastroDataNascimento" required>

                <label for="cadastroTipoChavePix">Tipo da chave Pix</label>
                <select id="cadastroTipoChavePix" required>
                    <option value="EMAIL">Email</option>
                    <option value="CPF">CPF</option>
                    <option value="TELEFONE">Telefone</option>
                    <option value="ALEATORIA">Chave aleatória</option>
                </select>

                <label for="cadastroLimite">Limite inicial</label>
                <input type="text" id="cadastroLimite" placeholder="R$ 0,00" required>

                <button type="submit">Abrir conta</button>

                <button type="button" class="auth-link" id="mostrar-login">
                    Já tenho conta
                </button>
            </form>

            </div>

            <p id="mensagem-login" class="form-message"></p>

            <div class="auth-footer">
                <button type="button" class="auth-link" id="mostrar-cadastro">Criar conta</button>
                <a href="index.html">Voltar ao dashboard</a>
            </div>
        </section>
    </main>

    <script src="../script/login.js"></script>
</body>
</html>
