<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eclipse Bank</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <main class="conteudo">
        <header class="topo">
            <div>
                <p>Bem-vinda de volta</p>
                <h2>Dashboard financeiro</h2>
            </div>
        </header>

        <section class="cards">
            <div class="card">
                <span>Saldo atual</span>
                <strong id="saldo-atual">R$ 0,00</strong>
            </div>

            <div class="card">
                <span>Economia</span>
                <strong id="economia">R$ 0,00</strong>
            </div>

            <div class="card">
                <span>Contas cadastradas</span>
                <strong id="total-contas">0</strong>
            </div>

            <div class="card">
                <span>Usuarios cadastrados</span>
                <strong id="total-usuarios">0</strong>
            </div>
        </section>

        <section class="painel">
            <h3>Ultimas transacoes</h3>

            <div>
                <label for="filtro-tipo">Filtrar por tipo</label>

                <select id="filtro-tipo">
                    <option value="TODOS">Todos</option>
                    <option value="RECEITA">Receita</option>
                    <option value="DESPESA">Despesa</option>
                    <option value="DEPOSITO">Deposito</option>
                    <option value="SAQUE">Saque</option>
                    <option value="PAGAMENTO">Pagamento</option>
                    <option value="TRANSFERENCIA">Transferencia</option>
                </select>
            </div>

            <div>
                <label for="filtro-categoria">Filtrar por categoria</label>

                <select id="filtro-categoria">
                    <option value="TODAS">Todas</option>
                </select>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Descricao</th>
                        <th>Categoria</th>
                        <th>Tipo</th>
                        <th>Valor</th>
                    </tr>
                </thead>
                <tbody id="tabela-transacoes"></tbody>
            </table>
        </section>

        <section class="painel">
            <h3>Nova transacao</h3>

            <form id="form-transacao">
                <input type="text" id="descricao" placeholder="Descricao" required>
                <input type="text" id="valor" placeholder="Valor" required>

                <select id="tipo" required>
                    <option value="RECEITA">Receita</option>
                    <option value="DESPESA">Despesa</option>
                    <option value="DEPOSITO">Deposito</option>
                    <option value="SAQUE">Saque</option>
                    <option value="PAGAMENTO">Pagamento</option>
                    <option value="TRANSFERENCIA">Transferencia</option>
                </select>

                <select id="categoria" required>
                    <option value="">Selecione uma categoria</option>
                </select>


                <button type="submit">Cadastrar</button>
            </form>

            <p id="mensagem"></p>
        </section>
    </main>

    <script src="../script/layout.js"></script>
    <script src="../script/script.js"></script>
</body>
</html>
