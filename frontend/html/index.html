<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eclipse Bank</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <aside class="sidebar">
        <h1>Eclipse Bank</h1>

        <nav>
            <a href="#">Dashboard</a>
            <a href="#">Extrato</a>
            <a href="#">Categorias</a>
            <a href="#">Metas</a>
            <a href="#">Cartões</a>
            <a href="#">Relatórios</a>
        </nav>
    </aside>

    <main class="conteudo">
        <header class="topo">
            <div>
                <p>Bem-vinda de volta</p>
                <h2>Dashboard financeiro</h2>
            </div>
        </header>

        <section class="cards">
            <div class="card">
                <span>Saldo atual</span>
                <strong id="saldo-atual">R$ 0,00</strong>
            </div>

            <div class="card">
                <span>Entradas do mês</span>
                <strong id="entradas-mes">R$ 0,00</strong>
            </div>

            <div class="card">
                <span>Saídas do mês</span>
                <strong id="saidas-mes">R$ 0,00</strong>
            </div>

            <div class="card">
                <span>Economia</span>
                <strong id="economia">R$ 0,00</strong>
            </div>
        </section>

        <section class="painel">
            <h3>Últimas transações</h3>

            <div>
                <label for="filtro-tipo">Filtrar por tipo</label>

                <select id="filtro-tipo">
                    <option value="TODOS">Todos</option>
                    <option value="RECEITA">Receita</option>
                    <option value="DESPESA">Despesa</option>
                    <option value="DEPOSITO">Deposito</option>
                    <option value="SAQUE">Saque</option>
                    <option value="PAGAMENTO">Pagamento</option>
                    <option value="TRANSFERENCIA">Transferência</option>
                </select>
            </div>

            <div>
                <label for="filtro-categoria">Filtrar por categoria</label>

                <select id="filtro-categoria">
                    <option value="TODAS">Todas</option>
                </select>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Descrição</th>
                        <th>Categoria</th>
                        <th>Tipo</th>
                        <th>Valor</th>
                    </tr>
                </thead>
                <tbody id="tabela-transacoes">
                    
                </tbody>
            </table>
        </section>

        <section class="painel">
            <h3>Nova transação</h3>

            <form id="form-transacao">
                <input type="text" name="" id="descricao" placeholder="Descrição" required>
                <input type="number" id="valor" placeholder="Valor" step="0.01" required>

                <select id="tipo" required>
                    <option value="RECEITA">Receita</option>
                    <option value="DESPESA">Despesa</option>
                    <option value="DEPOSITO">Depósito</option>
                    <option value="SAQUE">Saque</option>
                    <option value="PAGAMENTO">Pagamento</option>
                    <option value="TRANSFERENCIA">Transferência</option>
                </select>

                
                <select id="categoria" required>
                    <option value="">Selecione uma categoria</option>
                </select>

                <input type="date" id="data" required>

                <button type="submit">Cadastrar</button>
            </form>

            <p id="mensagem"></p>
        </section>
    </main>

    <script src="../script/script.js"></script>
</body>
</html>
