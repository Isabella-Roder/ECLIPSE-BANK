<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Conta - Eclipse Bank</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <main class="conteudo">
        <header class="topo">
            <div>
                <p>Area do cliente</p>
                <h2>Minha conta</h2>
            </div>
        </header>

        <section class="resumo-principal">
            <div>
                <span>Saldo disponivel</span>
                <strong id="saldo-conta">R$ 0,00</strong>
                <p id="mensagem-minha-conta">Carregando conta...</p>
            </div>

            <div class="resumo-acoes">
                <a href="transferencias.html">Transferir</a>
                <a href="extrato.html">Ver extrato</a>
                <a href="#">Pagamentos</a>
            </div>
        </section>

        <section class="cards">
            <div class="card">
                <span>Titular</span>
                <strong id="titular-conta">-</strong>
            </div>

            <div class="card">
                <span>Limite</span>
                <strong id="limite-conta">R$ 0,00</strong>
            </div>

            <div class="card">
                <span>Numero</span>
                <strong id="numero-conta">-</strong>
            </div>
        </section>

        <section class="painel info-bloco">
            <h3>Dados bancarios</h3>

            <div class="info-grid">
                <div>
                    <span>Chave Pix</span>
                    <strong id="chave-pix">-</strong>
                </div>

                <div>
                    <span>Usuario</span>
                    <strong id="usuario-conta">-</strong>
                </div>

                <div>
                    <span>Email</span>
                    <strong id="email-conta">-</strong>
                </div>

                <div>
                    <span>Tipo de conta</span>
                    <strong>Conta pessoal</strong>
                </div>
            </div>
        </section>
    </main>

    <script src="../script/layout.js"></script>
    <script src="../script/minha-conta.js"></script>
</body>
</html>
