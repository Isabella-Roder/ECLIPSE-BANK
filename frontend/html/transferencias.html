<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transferencias - Eclipse Bank</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <main class="conteudo">
        <header class="topo">
            <div>
                <p>Operacoes bancarias</p>
                <h2>Transferencias</h2>
            </div>
        </header>

        <section class="painel">
            <h3>Nova transferencia</h3>

            <form id="form-transferencia">
                <input type="number" id="contaDestinoId" placeholder="Numero da conta" required>
                <input type="number" id="valorTransferencia" placeholder="Valor" step="0.01" required>

                <button type="submit">Transferir</button>
            </form>

            <p id="mensagem-transferencia"></p>
        </section>
    </main>

    <script src="../script/layout.js"></script>
    <script src="../script/transferencias.js"></script>
</body>
</html>
