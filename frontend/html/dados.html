<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Dados - Eclipse Bank</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <main class="conteudo">
        <header class="topo">
            <div>
                <p>Area do cliente</p>
                <h2>Meus dados</h2>
            </div>
        </header>

        <section class="resumo-principal">
            <div>
                <span>Perfil do cliente</span>
                <strong id="nome-usuario">-</strong>
                <p id="mensagem-dados">Carregando dados...</p>
            </div>

            <div class="selo-conta">Pessoa fisica</div>
        </section>

        <section class="cards">
            <div class="card">
                <span>Nome social</span>
                <strong id="nome-social">-</strong>
            </div>

            <div class="card">
                <span>CPF</span>
                <strong id="cpf-usuario">-</strong>
            </div>

            <div class="card">
                <span>Nascimento</span>
                <strong id="data-nascimento">-</strong>
            </div>
        </section>

        <section class="painel info-bloco">
            <h3>Contato</h3>

            <div class="info-grid">
                <div>
                    <span>Email</span>
                    <strong id="email-usuario">-</strong>
                </div>

                <div>
                    <span>Telefone</span>
                    <strong id="telefone-usuario">-</strong>
                </div>

                <div>
                    <span>ID do usuario</span>
                    <strong id="id-usuario">-</strong>
                </div>

                <div>
                    <span>Cadastro</span>
                    <strong>Ativo</strong>
                </div>
            </div>
        </section>
    </main>

    <script src="../script/layout.js"></script>
    <script src="../script/dados.js"></script>
</body>
</html>
