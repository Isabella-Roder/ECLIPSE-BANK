<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extrato - Eclipse Bank</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <main class="conteudo">
        <header class="topo">
            <div>
                <p>Movimentacoes</p>
                <h2>Extrato por conta</h2>
            </div>
        </header>

        <section class="painel">
            <h3>Extrato da minha conta</h3>

            <p id="mensagem-extrato"></p>
        </section>

        <section class="painel">
            <div class="cabecalho-painel">
                <div>
                    <h3>Filtros</h3>
                    <p>Refine as movimentacoes por tipo, categoria ou periodo.</p>
                </div>
            </div>

            <form class="form-filtros-extrato" id="form-filtros-extrato">
                <select id="filtro-tipo">
                    <option value="">Todos os tipos</option>
                </select>

                <select id="filtro-categoria">
                    <option value="">Todas as categorias</option>
                </select>

                <input type="date" id="filtro-data-inicio">

                <input type="date" id="filtro-data-fim">

                <button type="button" id="limpar-filtros">Limpar filtros</button>
            </form>
        </section>

        <section class="painel">
            <h3>Transacoes da conta</h3>

            <table>
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>Descricao</th>
                        <th>Categoria</th>
                        <th>Tipo</th>
                        <th>Valor</th>
                    </tr>
                </thead>
                <tbody id="tabela-extrato"></tbody>
            </table>
        </section>
    </main>

    <script src="../script/layout.js"></script>
    <script src="../script/extrato.js"></script>
</body>
</html>
